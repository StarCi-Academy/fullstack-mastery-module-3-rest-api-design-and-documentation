# Run command:
# docker compose -f .docker/postgresql.yaml up --build -d
#
# Stop + remove volumes:
# docker compose -f .docker/postgresql.yaml down -v
#
# EN: Local PostgreSQL for the REST CRUD demo (TypeORM).

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restful_demo
    volumes:
      - restful_demo_pg:/var/lib/postgresql/data

volumes:
  restful_demo_pg:
    driver: local
